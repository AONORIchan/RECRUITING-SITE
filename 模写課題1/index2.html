<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>採用情報｜しょうしん</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style2.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1 class="logo">SHOUSHIN RECRUIT</h1>

    <nav class="nav">
      <ul>
        <li><a href="#">トップ</a></li>
        <li><a href="#">しょうしんを知る</a></li>
        <li><a href="#">仕事を知る</a></li>
        <li><a href="#">人を知る</a></li>
        <li><a href="#">募集要項</a></li>
      </ul>
    </nav>

    <a href="#" class="entry-btn">ENTRY</a>
  </div>
</header>

<main>

  <!-- ヒーロー -->
  <section class="hero">
    <div class="hero-bg">
      <!-- 実サイトは動画/GIF想定 -->
      <img src="hero.gif" alt="メインビジュアル">
    </div>

    <div class="hero-text">
      <p class="hero-en">THE FUTURE IS NOW</p>
      <h2>
        地域経済を動かす金融を、<br>
        とことんやる。
      </h2>
    </div>
  </section>

  <!-- ニュース -->
  <section class="news">
    <h3 class="section-title">NEWS</h3>
    <ul class="news-list">
      <li>
        <time>2025.07.01</time>
        <span>採用サイトをリニューアルしました</span>
      </li>
      <li>
        <time>2025.06.01</time>
        <span>26卒エントリー受付開始</span>
      </li>
    </ul>
  </section>

  <!-- インタビュー -->
  <section class="interview">
    <h3 class="section-title">INTERVIEW</h3>

    <div class="interview-list">
      <article class="interview-card">
        <img src="person1.jpg" alt="">
        <p class="job">営業</p>
        <h4>A.O</h4>
      </article>

      <article class="interview-card">
        <img src="person2.jpg" alt="">
        <p class="job">営業マネージャー</p>
        <h4>K.M</h4>
      </article>

      <article class="interview-card">
        <img src="person3.jpg" alt="">
        <p class="job">本部</p>
        <h4>S.Y</h4>
      </article>
    </div>
  </section>

  <!-- 募集 -->
  <section class="recruit">
    <h3 class="section-title">RECRUIT</h3>

    <div class="recruit-links">
      <a href="#" class="recruit-box">新卒採用</a>
      <a href="#" class="recruit-box">中途採用</a>
    </div>
  </section>

</main>

<footer class="footer">
  <p>© SHOSIN CREDIT UNION</p>
</footer>

</body>
</html>
